################################################################################
# ld65 linker config for SNES LoROM (32 KB, single bank)
#
# One contiguous 32 KB memory region ($8000–$FFFF), filled with $FF.
# Segments are placed at fixed addresses within it via the `start` directive.
################################################################################

MEMORY {
    ROM: start = $8000, size = $8000, type = ro,
         file = %O, fill = yes, fillval = $FF;
}

SEGMENTS {
    CODE:    load = ROM, type = ro;
    RODATA:  load = ROM, type = ro;
    HEADER:  load = ROM, type = ro, start = $FFC0;
    VECTORS: load = ROM, type = ro, start = $FFE4;
}
