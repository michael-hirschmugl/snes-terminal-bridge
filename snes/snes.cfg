################################################################################
# ld65 linker config for SNES LoROM (64 KB, two banks).
#
# Bank 0 ($00:8000–$00:FFFF): code, font, keymap, palettes.
# Bank 1 ($01:8000–$01:FFFF): BG1 wallpaper tiles + tilemap (~26 KB).
#
# ROM1 start=$18000 gives wallpaper labels bank byte $01 via the ^ operator,
# matching the DMA source bank for the BG1 tile/tilemap transfers.
################################################################################

MEMORY {
    ROM0:    start = $8000,  size = $8000, type = ro,
             file = %O, fill = yes, fillval = $FF;
    ROM1:    start = $18000, size = $8000, type = ro,
             file = %O, fill = yes, fillval = $FF;
}

SEGMENTS {
    CODE:    load = ROM0, type = ro;
    RODATA:  load = ROM0, type = ro;
    RODATA1: load = ROM1, type = ro;
    HEADER:  load = ROM0, type = ro, start = $FFC0;
    VECTORS: load = ROM0, type = ro, start = $FFE4;
}
